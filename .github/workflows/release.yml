name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish musl binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      # 项目级 .cargo/config.toml 会在 CI 中与 setup-cross-toolchain-action 冲突，
      # 提前移除，让 CI 工具自行配置 linker。
      - name: Remove project-level cargo config
        run: rm -f .cargo/config.toml

      - name: Install aarch64-musl cross-compiler
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-musl

      - name: Build x86_64-unknown-linux-musl
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build aarch64-unknown-linux-musl
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Package tarballs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            cp "target/${target}/release/netdump" "netdump-${target}"
            tar czf "dist/netdump-${VERSION}-${target}.tar.gz" "netdump-${target}" LICENSE
            rm "netdump-${target}"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/netdump-*.tar.gz
          generate_release_notes: true
